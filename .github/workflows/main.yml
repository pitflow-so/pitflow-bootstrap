name: Pitflow Bootstrap

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:

  # -------------------------------------------------------------------------
  # JOB 1 - BOOTSTRAP S3
  # -------------------------------------------------------------------------
  bootstrap-s3:
    name: Bootstrap S3 Backend
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Create TF State Bucket if not exists
        run: |
          if ! aws s3api head-bucket --bucket tfstate-backend-fiap-pitflow 2>/dev/null; then
              echo "Criando bucket Terraform State..."
              aws s3 mb s3://tfstate-backend-fiap-pitflow --region us-east-1

              echo "Habilitando versionamento..."
              aws s3api put-bucket-versioning \
                --bucket tfstate-backend-fiap-pitflow \
                --versioning-configuration Status=Enabled

          else
              echo "Bucket já existe nesta conta, continuando..."
          fi

  # -------------------------------------------------------------------------
  # JOB 2 - TERRAFORM INFRASTRUCTURE
  # -------------------------------------------------------------------------
  infrastructure:
    name: Set Base Cloud Infrastructure
    runs-on: ubuntu-latest
    needs: bootstrap-s3

    outputs:
      secret_pitflow_name: ${{ steps.tf-output.outputs.secret_pitflow_name }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Terraform Setup
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          cd infra/terraform
          terraform init
    
      - name: Terraform Format Check
        run: |
            cd infra/terraform
            terraform fmt -check -recursive

      - name: Terraform Validate
        run: |
          cd infra/terraform
          terraform validate

      - name: Terraform Plan
        run: |
          cd infra/terraform
          terraform plan -out=main.tfplan

      - name: Validate Required GitHub Secrets
        env:
          PITFLOW_OPERATION_DB_USERNAME: ${{ secrets.PITFLOW_OPERATION_DB_USERNAME }}
          PITFLOW_OPERATION_DB_PASSWORD: ${{ secrets.PITFLOW_OPERATION_DB_PASSWORD }}
          PITFLOW_INVENTORY_DB_USERNAME: ${{ secrets.PITFLOW_INVENTORY_DB_USERNAME }}
          PITFLOW_INVENTORY_DB_PASSWORD: ${{ secrets.PITFLOW_INVENTORY_DB_PASSWORD }}
          PITFLOW_REGISTRY_DB_USERNAME: ${{ secrets.PITFLOW_REGISTRY_DB_USERNAME }}
          PITFLOW_REGISTRY_DB_PASSWORD: ${{ secrets.PITFLOW_REGISTRY_DB_PASSWORD }}
          PITFLOW_PAYMENT_DB_USERNAME: ${{ secrets.PITFLOW_PAYMENT_DB_USERNAME }}
          PITFLOW_PAYMENT_DB_PASSWORD: ${{ secrets.PITFLOW_PAYMENT_DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MOCK_MESSAGE: ${{ secrets.MOCK_MESSAGE }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}
        run: |
          set -euo pipefail

          required_secrets=(
            PITFLOW_OPERATION_DB_USERNAME
            PITFLOW_OPERATION_DB_PASSWORD
            PITFLOW_INVENTORY_DB_USERNAME
            PITFLOW_INVENTORY_DB_PASSWORD
            PITFLOW_REGISTRY_DB_USERNAME
            PITFLOW_REGISTRY_DB_PASSWORD
            PITFLOW_PAYMENT_DB_USERNAME
            PITFLOW_PAYMENT_DB_PASSWORD
            JWT_SECRET
            MOCK_MESSAGE
            MAIL_USERNAME
            MAIL_PASSWORD
            DATADOG_API_KEY
          )

          for secret_name in "${required_secrets[@]}"; do
            if [ -z "${!secret_name}" ]; then
              echo "GitHub Secret obrigatório não configurado: ${secret_name}" >&2
              exit 1
            fi
          done

      - name: Terraform Apply
        run: |
          cd infra/terraform
          terraform apply -auto-approve main.tfplan

      - name: Merge Bootstrap Values Into Secret
        env:
          SECRET_NAME: pitflow/bootstrap
          PITFLOW_OPERATION_DB_USERNAME: ${{ secrets.PITFLOW_OPERATION_DB_USERNAME }}
          PITFLOW_OPERATION_DB_PASSWORD: ${{ secrets.PITFLOW_OPERATION_DB_PASSWORD }}
          PITFLOW_INVENTORY_DB_USERNAME: ${{ secrets.PITFLOW_INVENTORY_DB_USERNAME }}
          PITFLOW_INVENTORY_DB_PASSWORD: ${{ secrets.PITFLOW_INVENTORY_DB_PASSWORD }}
          PITFLOW_REGISTRY_DB_USERNAME: ${{ secrets.PITFLOW_REGISTRY_DB_USERNAME }}
          PITFLOW_REGISTRY_DB_PASSWORD: ${{ secrets.PITFLOW_REGISTRY_DB_PASSWORD }}
          PITFLOW_PAYMENT_DB_USERNAME: ${{ secrets.PITFLOW_PAYMENT_DB_USERNAME }}
          PITFLOW_PAYMENT_DB_PASSWORD: ${{ secrets.PITFLOW_PAYMENT_DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MOCK_MESSAGE: ${{ secrets.MOCK_MESSAGE }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}
        run: |
          set -euo pipefail

          secret_file="$(mktemp)"
          trap 'rm -f "${secret_file}"' EXIT

          current_secret="$(
            aws secretsmanager get-secret-value \
              --secret-id "${SECRET_NAME}" \
              --query SecretString \
              --output text 2>/dev/null || printf '{}'
          )"

          printf '%s' "${current_secret}" | jq '
            del(.DB_NAME, .DB_USERNAME, .DB_PASSWORD, .DB_HOST, .DB_PORT)
            | . + {
              PITFLOW_OPERATION_DB_NAME: "pitflow-operation-db",
              PITFLOW_OPERATION_DB_USERNAME: env.PITFLOW_OPERATION_DB_USERNAME,
              PITFLOW_OPERATION_DB_PASSWORD: env.PITFLOW_OPERATION_DB_PASSWORD,
              PITFLOW_INVENTORY_DB_NAME: "pitflow-inventory-db",
              PITFLOW_INVENTORY_DB_USERNAME: env.PITFLOW_INVENTORY_DB_USERNAME,
              PITFLOW_INVENTORY_DB_PASSWORD: env.PITFLOW_INVENTORY_DB_PASSWORD,
              PITFLOW_REGISTRY_DB_NAME: "pitflow-registry-db",
              PITFLOW_REGISTRY_DB_USERNAME: env.PITFLOW_REGISTRY_DB_USERNAME,
              PITFLOW_REGISTRY_DB_PASSWORD: env.PITFLOW_REGISTRY_DB_PASSWORD,
              PITFLOW_PAYMENT_DB_NAME: "pitflow-payment-db",
              PITFLOW_PAYMENT_DB_USERNAME: env.PITFLOW_PAYMENT_DB_USERNAME,
              PITFLOW_PAYMENT_DB_PASSWORD: env.PITFLOW_PAYMENT_DB_PASSWORD,
              PITFLOW_ORCHESTRATOR_TABLE_NAME: "pitflow-orchestrator",
              PITFLOW_ORCHESTRATOR_AWS_REGION: "us-east-1",
              JWT_SECRET: env.JWT_SECRET,
              MOCK_MESSAGE: env.MOCK_MESSAGE,
              MAIL_USERNAME: env.MAIL_USERNAME,
              MAIL_PASSWORD: env.MAIL_PASSWORD,
              DATADOG_API_KEY: env.DATADOG_API_KEY
            }
            | .PITFLOW_OPERATION_DB_HOST //= ""
            | .PITFLOW_OPERATION_DB_PORT //= "5432"
            | .PITFLOW_INVENTORY_DB_HOST //= ""
            | .PITFLOW_INVENTORY_DB_PORT //= "5432"
            | .PITFLOW_REGISTRY_DB_HOST //= ""
            | .PITFLOW_REGISTRY_DB_PORT //= "5432"
            | .PITFLOW_PAYMENT_DB_HOST //= ""
            | .PITFLOW_PAYMENT_DB_PORT //= "5432"
          ' > "${secret_file}"

          aws secretsmanager put-secret-value \
            --secret-id "${SECRET_NAME}" \
            --secret-string "file://${secret_file}" \
            > /dev/null

      - name: Capture Outputs
        id: tf-output
        run: |
          cd infra/terraform
          echo "secret_pitflow_name=$(terraform output -raw secret_pitflow_name)" >> $GITHUB_OUTPUT
