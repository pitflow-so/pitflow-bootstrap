name: Pitflow Bootstrap

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:

  # -------------------------------------------------------------------------
  # JOB 1 - BOOTSTRAP S3
  # -------------------------------------------------------------------------
  bootstrap-s3:
    name: Bootstrap S3 Backend
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Create TF State Bucket if not exists
        run: |
          if ! aws s3api head-bucket --bucket tfstate-backend-fiap-pitflow 2>/dev/null; then
              echo "Criando bucket Terraform State..."
              aws s3 mb s3://tfstate-backend-fiap-pitflow --region us-east-1

              echo "Habilitando versionamento..."
              aws s3api put-bucket-versioning \
                --bucket tfstate-backend-fiap-pitflow \
                --versioning-configuration Status=Enabled

          else
              echo "Bucket já existe nesta conta, continuando..."
          fi

  # -------------------------------------------------------------------------
  # JOB 2 - TERRAFORM INFRASTRUCTURE
  # -------------------------------------------------------------------------
  infrastructure:
    name: Set Base Cloud Infrastructure
    runs-on: ubuntu-latest
    needs: bootstrap-s3

    outputs:
      secret_pitflow_name: ${{ steps.tf-output.outputs.secret_pitflow_name }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Terraform Setup
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          cd infra/terraform
          terraform init
    
      - name: Terraform Format Check
        run: |
            cd infra/terraform
            terraform fmt -check -recursive

      - name: Terraform Validate
        run: |
          cd infra/terraform
          terraform validate

      - name: Terraform Plan
        run: |
          cd infra/terraform
          terraform plan \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="db_username=${{ secrets.DB_USERNAME }}" \
            -var="db_name=${{ secrets.DB_NAME }}" \
            -var="db_host=${{ secrets.DB_HOST }}" \
            -var="db_port=${{ secrets.DB_PORT }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="mock_message=${{ secrets.MOCK_MESSAGE }}" \
            -var="mail_username=${{ secrets.MAIL_USERNAME }}" \
            -var="mail_password=${{ secrets.MAIL_PASSWORD }}" \
            -var="datadog_api_key=${{ secrets.DATADOG_API_KEY }}" \
            -out=main.tfplan

      - name: Terraform Apply
        run: |
          cd infra/terraform
          terraform apply -auto-approve main.tfplan

      - name: Capture Outputs
        id: tf-output
        run: |
          cd infra/terraform
          echo "secret_pitflow_name=$(terraform output -raw secret_pitflow_name)" >> $GITHUB_OUTPUT